# GitZen Release Workflow
# Automatically builds and releases when a version tag is pushed
# Optimized: minimal testing, reuse CI results when possible

name: Release

on:
  push:
    tags:
      - "v*"  # Trigger on version tags (v1.0.0, v1.2.3-beta, etc.)

permissions:
  contents: write  # Required for creating releases

env:
  GO_VERSION: "1.24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Quick validation only (assume CI already tested thoroughly)
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Only essential validation - no full test suite
      - name: Verify dependencies
        run: |
          go mod tidy
          go mod verify

      - name: Quick build verification
        run: go build -o /tmp/gitzen ./cmd/gitzen

  # Job 2: Build and release with GoReleaser
  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*.tar.gz
          retention-days: 7